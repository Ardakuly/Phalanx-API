version: "3.9"

services:
  phalanx-db:
    image: postgres:16
    container_name: phalanx-db
    environment:
      POSTGRES_DB: phalanx
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - phalanx-volume:/var/lib/postgresql/data
    networks:
      - shared-network

  phalanx-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phalanx
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://phalanx-db:5432/phalanx
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
    depends_on:
      - phalanx-db
    networks:
      - shared-network

  phalanx-minio:
    image: minio/minio
    container_name: phalanx-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - phalanx-minio-volume:/data
    command: server /data --console-address ":9001"
    networks:
      - shared-network

  minio-create-buckets:
    image: minio/mc
    container_name: minio-create-buckets
    depends_on:
      - phalanx-minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://phalanx-minio:9000 admin adminpassword; do echo 'Waiting for MinIO...'; sleep 1; done;
      /usr/bin/mc mb myminio/product-images || true;
      /usr/bin/mc anonymous set public myminio/product-images || true;
      exit 0;
      "
    networks:
      - shared-network

volumes:
  phalanx-volume:
  phalanx-minio-volume:

networks:
  shared-network:
    name: phalanx-shared-network # We give it an explicit name
    driver: bridge