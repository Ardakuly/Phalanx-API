<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Ежемесячный отчет о продажах</title>

    <style>
        @page {
            size: A4 landscape;
            margin: 15mm;
        }

        body {
            font-family: 'DejaVu Sans', Arial, sans-serif;
            color: #333;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2c3e50;
        }

        h1 {
            margin: 0;
            color: #2c3e50;
            font-size: 24px;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            font-size: 11px;
            table-layout: fixed;
            word-wrap: break-word;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 6px 8px;
            text-align: left;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .transaction-header {
            background-color: #34495e;
            color: #ffffff;
            font-weight: bold;
        }

        .transaction-data {
            background-color: #f4f6f7;
            font-weight: bold;
        }

        .product-header th {
            background-color: #ecf0f1;
            color: #2c3e50;
            font-weight: bold;
        }

        .summary-table {
            width: 50%;
            margin-left: auto;
            margin-right: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .summary-header th {
            background-color: #2c3e50;
            color: #ffffff;
            text-align: right;
            padding: 12px;
        }

        .summary-data td {
            background-color: #f9f9f9;
            text-align: right;
            font-weight: bold;
            font-size: 14px;
            padding: 12px;
        }

        td.number, th.number {
            text-align: right;
        }

        .spacer-row td {
            border: none;
            height: 15px;
            background-color: transparent;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>Ежемесячный отчет о продажах</h1>
</div>

<table>
    <tbody th:each="doc : ${transactions}">

    <tr class="transaction-header">
        <th>Номер документа</th>
        <th>Продавец</th>
        <th>Тип оплаты</th>
        <th class="number">Общая сумма</th>
        <th class="number">Маржа</th>
        <th>Комментарий</th>
        <th class="number">Дата и время продажи</th>
    </tr>

    <tr class="transaction-data">
        <td th:text="${doc.documentNumber}"></td>
        <td th:text="${doc.seller != null ? doc.seller.firstName + ' ' + doc.seller.lastName : '—'}"></td>
        <td th:text="${doc.paymentType != null ? doc.paymentType.name() : '—'}"></td>
        <td class="number" th:text="${doc.totalIncome + ' ₸'}"></td>
        <td class="number" th:text="${doc.margin + ' ₸'}"></td>
        <td th:text="${doc.comment != null ? doc.comment : '—'}"></td>
        <td class="number" th:text="${#temporals.format(doc.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
    </tr>

    <tr class="product-header">
        <th colspan="2">Название товара</th>
        <th>Штрихкод</th>
        <th class="number">Количество</th>
        <th class="number">Закупочная цена</th>
        <th class="number">Цена продажи</th>
        <th class="number">Маржа</th>
    </tr>

    <tr th:each="g : ${doc.outboundGoods}">
        <td colspan="2" th:text="${g.name}"></td>
        <td th:text="${g.barcode}"></td>
        <td class="number" th:text="${g.quantity}"></td>
        <td class="number" th:text="${g.purchasedPrice + ' ₸'}"></td>
        <td class="number" th:text="${g.sellingPrice + ' ₸'}"></td>
        <td class="number" th:text="${g.sellingPrice.subtract(g.purchasedPrice) + ' ₸'}"></td>
    </tr>

    <tr class="spacer-row"><td colspan="7"></td></tr>
    </tbody>
</table>

<table class="summary-table">
    <tbody>
    <tr class="summary-header">
        <th>Общий доход</th>
        <th>Общая прибыль</th>
    </tr>
    <tr class="summary-data">
        <td th:text="${totalIncome + ' ₸'}"></td>
        <td th:text="${totalProfit + ' ₸'}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
