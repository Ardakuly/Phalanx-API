<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Отчет по остаткам</title>
    <style>
        @page {
            size: A4 landscape;
            margin: 15mm;
        }

        body {
            font-family: 'DejaVu Sans', Arial, sans-serif;
            color: #333;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2c3e50;
        }

        h2 {
            margin: 0;
            color: #2c3e50;
            font-size: 24px;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 11px;
            table-layout: fixed;
            word-wrap: break-word;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 8px;
            text-align: left;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        th {
            background-color: #34495e;
            color: #ffffff;
            font-weight: bold;
            text-transform: uppercase;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .number {
            text-align: right;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Отчет по остаткам продуктов</h2>
</div>

<table>
    <thead>
    <tr>
        <th>Название</th>
        <th>Артикул (SKU)</th>
        <th>Штрихкод</th>
        <th>Категория</th>
        <th>Ед. изм.</th>
        <th class="number">Закупочная цена</th>
        <th class="number">Цена продажи</th>
        <th class="number">Остаток</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="p : ${products}">
        <td th:text="${p.name}"></td>
        <td th:text="${p.sku != null ? p.sku : '—'}"></td>
        <td th:text="${p.barcode}"></td>
        <td th:text="${p.category != null ? p.category.name : '—'}"></td>
        <td th:text="${p.unit != null ? p.unit : '—'}"></td>
        <td class="number" th:text="${p.purchasedPrice + ' ₸'}"></td>
        <td class="number" th:text="${p.sellingPrice + ' ₸'}"></td>
        <td class="number" th:text="${p.stockBalance}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
